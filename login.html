<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legazpi City Water District - Login</title>
<style>
/* BODY WITH BEAUTIFUL WATER BACKGROUND */
body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: linear-gradient(to bottom, #a0d8f1, #d9f0fc);
    overflow: hidden;
}

/* BUBBLES ANIMATION */
.bubble {
    position: absolute;
    bottom: -50px;
    width: 15px;
    height: 15px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: rise 6s infinite linear;
}

.bubble:nth-child(1) { left: 10%; animation-duration: 5s; }
.bubble:nth-child(2) { left: 25%; animation-duration: 7s; width:20px;height:20px;}
.bubble:nth-child(3) { left: 40%; animation-duration: 6s; }
.bubble:nth-child(4) { left: 55%; animation-duration: 8s; width:25px;height:25px; }
.bubble:nth-child(5) { left: 70%; animation-duration: 5.5s; }
.bubble:nth-child(6) { left: 85%; animation-duration: 7.5s; width:18px;height:18px;}

@keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0.6; }
    50% { opacity: 1; }
    100% { transform: translateY(-600px) scale(1.3); opacity: 0; }
}

/* GREETING */
#greeting {
    font-size: 1.5em;
    color: #0b5394;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeIn 2s forwards;
}

/* Fade-in animation */
@keyframes fadeIn {
    to { opacity: 1; }
}

/* HEADER */
h1 {
    color: #0b5394;
    text-align: center;
    margin-bottom: 20px;
    font-size: 2em;
    text-shadow: 1px 1px 2px #fff;
}

/* CONTAINER */
.container {
    background: #ffffffcc; /* semi-transparent white */
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
    z-index: 1;
}

/* WATER WAVES ANIMATION INSIDE CONTAINER */
.container::before, .container::after {
    content: '';
    position: absolute;
    width: 200%;
    height: 200px;
    background: rgba(0, 130, 255, 0.1);
    border-radius: 43%;
    animation: wave 6s infinite linear;
    top: -60px;
    left: -50%;
    pointer-events: none;
    z-index: 0;
}

.container::after {
    animation-delay: 3s;
}

@keyframes wave {
    0% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(0%) translateY(10px); }
    100% { transform: translateX(-50%) translateY(0); }
}

/* FORM ELEMENTS */
h2 {
    color: #0b5394;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #0b5394;
    border-radius: 8px;
    box-sizing: border-box;
    outline: none;
    position: relative;
    z-index: 2;
}

.password-box {
    position: relative;
}

.password-box input {
    padding-right: 40px;
}

.eye-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    width: 24px;
    height: 24px;
    z-index: 2;
}

.eye-btn svg { fill: #0b5394; }

/* BUTTONS */
button[type="submit"], .back-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    cursor: pointer;
    background: #0b5394;
    color: #fff;
    transition: 0.3s;
    position: relative;
    z-index: 2;
}

button[type="submit"]:hover, .back-btn:hover {
    background: #065a9e;
}

/* LINKS */
.link {
    text-align: center;
    margin-top: 12px;
    position: relative;
    z-index: 2;
}

#registerForm { display: none; }

</style>
</head>
<body>

<!-- BUBBLES -->
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<h1>Legazpi City Water District</h1>
<div id="greeting">Welcome!</div>

<div class="container">

<h2>Login</h2>

<form id="loginForm" onsubmit="return loginUser()">
<input type="text" id="username" placeholder="Username" required>

<div class="password-box">
<input type="password" id="password" placeholder="Password" required>
<button type="button" class="eye-btn" onclick="togglePassword('password', this)">
<svg viewBox="0 0 24 24">
<path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
<circle cx="12" cy="12" r="2.5"/>
</svg>
</button>
</div>

<button type="submit">Login</button>
</form>

<div class="link">
<a href="#" onclick="showRegister()">Create Account</a>
</div>

<form id="registerForm">
<input type="text" id="reguser" placeholder="New Username" required>

<div class="password-box">
<input type="password" id="regpass" placeholder="New Password" required>
<button type="button" class="eye-btn" onclick="togglePassword('regpass', this)">
<svg viewBox="0 0 24 24">
<path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
<circle cx="12" cy="12" r="2.5"/>
</svg>
</button>
</div>

<button type="submit">Register</button>
<button type="button" class="back-btn" onclick="showLogin()">Back</button>
</form>

</div>

<script>
/* Display greeting based on time */
window.onload = function() {
    const greetingEl = document.getElementById("greeting");
    const now = new Date();
    const hour = now.getHours();
    let greetingText = "Welcome!";
    if(hour >= 5 && hour < 12) greetingText = "Good Morning!";
    else if(hour >= 12 && hour < 17) greetingText = "Good Afternoon!";
    else greetingText = "Good Evening!";
    greetingEl.textContent = greetingText;
}

/* Toggle password visibility */
function togglePassword(inputId, btn){
    const input = document.getElementById(inputId);
    if(input.type === "password"){
        input.type = "text";
        btn.innerHTML = `<svg viewBox="0 0 24 24">
        <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
        <line x1="2" y1="2" x2="22" y2="22" stroke="#0b5394" stroke-width="2"/>
        </svg>`;
    } else {
        input.type = "password";
        btn.innerHTML = `<svg viewBox="0 0 24 24">
        <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
        <circle cx="12" cy="12" r="2.5"/>
        </svg>`;
    }
}

/* Switch forms */
function showRegister(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("registerForm").style.display="block";
}
function showLogin(){
    document.getElementById("registerForm").style.display="none";
    document.getElementById("loginForm").style.display="block";
}

/* Login logic */
function loginUser(){
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const users = JSON.parse(localStorage.getItem("users") || "{}");

    if(users[username] && users[username] === password){
        localStorage.setItem("loggedInUser", username);
        window.location.href = "receipt.html"; 
    } else {
        alert("Invalid username or password!");
    }
    return false;
}

/* Registration logic */
document.getElementById("registerForm").onsubmit = function(e){
    e.preventDefault();
    const newUser = document.getElementById("reguser").value.trim();
    const newPass = document.getElementById("regpass").value;
    const users = JSON.parse(localStorage.getItem("users") || "{}");

    if(users[newUser]){
        alert("Username already exists!");
        return;
    }

    users[newUser] = newPass;
    localStorage.setItem("users", JSON.stringify(users));
    alert("Account created successfully! You can now login.");
    showLogin();
}
</script>

</body>
</html>
